<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Mjusyk</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: file:; media-src 'self' file: data: blob:;"
    />
    <link href="./assets/layout.css" type="text/css" rel="stylesheet" />
    <link href="./assets/sidebar.css" type="text/css" rel="stylesheet" />
    <link href="./assets/gridView.css" type="text/css" rel="stylesheet" />
    <link href="./assets/tableView.css" type="text/css" rel="stylesheet" />
    <link href="./assets/modals.css" type="text/css" rel="stylesheet" />
    <link href="./assets/contextMenu.css" type="text/css" rel="stylesheet" />
    <link href="./assets/player.css" type="text/css" rel="stylesheet" />
    <link href="./assets/equalizer.css" type="text/css" rel="stylesheet" />
  </head>

<body>
  <div id="side-panel">

    <button id="choose-folder">Select folder</button>
    <button id="toggle-view">Toggle Grid/Table</button>

    <h3>Folders</h3>
    <div id="folder-list"></div>

    <h3>Medatada</h3>
    <div id="metadata-options"></div>

    <h3>Playlists</h3>
    <button id="new-playlist">New Playlist</button>
    <div id="playlist-list"></div>

    <button id="export-playlist">Export</button>
    <button id="import-playlist">Import</button>
    <button id="show-stats">Show Stats</button>
    <div id="equalizer"></div>
  </div>

  <div id="file-grid"></div>

  <div id="loader">Loading music...</div>

  <div id="new-playlist-modal">
    <div>
      <h3>Create Playlist</h3>
      <input 
        id="playlist-name-input" 
        type="text" 
        placeholder="Playlist name…" 
      />
      <button id="playlist-create-btn">Create</button>
      <button id="playlist-cancel-btn">Cancel</button>
    </div>
  </div>

  <div id="player-panel">
  <img id="player-art" src="./assets/placeholder.png" />
  <div id="track-info">
    <div id="track-title">Title</div>
    <div id="track-artist">Artist</div>
  </div>
  <input type="range" id="progress-bar" value="0" min="0" max="100" />
  <div id="time-display">
    <span id="current-time">0:00</span> / <span id="total-time">0:00</span>
  </div>
  <div id="controls">
    <button id="shuffle-btn" class="control-button">🔀</button>
    <button id="prev-btn">⏮</button>
    <button id="play-toggle">▶️</button>
    <button id="next-btn">⏭</button>
    <button id="loop-btn" class="control-button">🔁</button>
    <input type="range" id="volume-slider" min="0" max="1" step="0.001" value="0.02" />
  </div>
</div>

  <script type="module" src="./src/renderer.ts"></script>
  <script type="module" src="./src/musicRenderer.ts"></script>
</body>
</html>
